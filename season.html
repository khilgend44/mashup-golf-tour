         style="transition:all 0.15s">

    </div>
    <div class="border-t border-border text-center py-4 text-gray-600 text-xs font-body">
      MashUp Golf &nbsp;·&nbsp; A Simulator Golf League

  <script type="module">
    import { loadSeasons, loadEvents, loadFormats, fetchScorecards } from './js/api.js';
    import { applyFormat, applyPayouts, resolveSidePots } from './js/scoring.js';

    const params = new URLSearchParams(window.location.search);

    async function init() {
      const [seasons, events, formats] = await Promise.all([loadSeasons(), loadEvents(), loadFormats()]);
      const seasonId = params.get('id') || seasons.find(s => s.status === 'active')?.id || seasons[0]?.id;
      const season = seasons.find(s => s.id === seasonId);
      if (!season) { showError(`Season "${seasonId}" not found.`); return; }

      const seasonEvents = events
        .filter(e => e.season === seasonId)
        .sort((a, b) => {
          if (!a.date && !b.date) return 0;
          if (!a.date) return 1;
          if (!b.date) return -1;
          return new Date(a.date) - new Date(b.date);
        });

      renderHeader(season, seasonEvents);

      document.getElementById('breadcrumb').innerHTML =
        `<a href="index.html" class="hover:text-gray-300 transition-colors">Home</a> <span class="mx-1">›</span> <span class="text-gray-300">${season.name}</span>`;

      const standings = await buildStandings(seasonEvents.filter(e => e.status === 'completed'), formats);

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('app').innerHTML = renderApp(season, seasonEvents, standings);
      document.title = `${season.name} — MashUp Golf`;
    }

    function renderHeader(season, events) {
      const completed = events.filter(e => e.status === 'completed').length;
      const statusLabel = season.status === 'active' ? '● ACTIVE' : 'COMPLETED';
      const statusColor = season.status === 'active' ? 'text-flame' : 'text-gray-500';

      document.getElementById('season-header').innerHTML = `
        <div class="text-xs font-heading font-600 tracking-widest ${statusColor} uppercase mb-2">${statusLabel}</div>
        <h1 class="font-display text-5xl tracking-wider text-white mb-2">${season.name}</h1>
        <p class="text-gray-500 text-sm">${season.description} &nbsp;·&nbsp; ${season.year}</p>
        <div class="flex gap-4 mt-4 text-xs text-gray-600">
          <span><b class="text-gray-300">${events.length}</b> Events</span>
          <span><b class="text-gray-300">${completed}</b> Completed</span>
        </div>
      `;
    }

    function renderApp(season, events, standings) {
      const completed = events.filter(e => e.status === 'completed');
      const upcoming  = events.filter(e => e.status !== 'completed');

      return `
        <!-- Season Standings — full width -->
        <section class="mb-10">
          <h2 class="font-heading font-700 text-sm tracking-widest text-gray-400 uppercase mb-3">Season Standings</h2>
          ${standings.length
            ? standingsTable(standings)
            : `<div class="card-shadow bg-card border border-border rounded-lg p-6 text-center text-gray-600 text-sm">Standings will appear once events have payouts recorded.</div>`}
        </section>

        <!-- Events list — full width -->
        ${upcoming.length ? `
        <section class="mb-8">
          <h2 class="font-heading font-700 text-sm tracking-widest text-gray-400 uppercase mb-3">Upcoming</h2>
          <div class="space-y-2">${upcoming.map(e => eventCard(e)).join('')}</div>
        </section>` : ''}

        <section>
          <h2 class="font-heading font-700 text-sm tracking-widest text-gray-400 uppercase mb-3">Results</h2>
          ${completed.length
            ? `<div class="space-y-2">${completed.map(e => eventCard(e)).join('')}</div>`
            : `<p class="text-gray-600 text-sm py-6">No completed events yet.</p>`}
        </section>
      `;
    }

    function eventCard(e) {
      const dateStr = e.date
        ? new Date(e.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : 'Date TBD';
      const isCompleted = e.status === 'completed';
      const dot = isCompleted
        ? '<span class="inline-block w-2 h-2 rounded-full bg-emerald-500 mr-1.5"></span>'
        : '<span class="inline-block w-2 h-2 rounded-full bg-amber-400 animate-pulse mr-1.5"></span>';

      const inner = `
        <div class="card-shadow event-card bg-card border border-border rounded-lg px-5 py-4 flex items-center gap-4">
          <div class="flex-1 min-w-0">
            <div class="font-heading font-700 text-base text-white truncate">${e.name}</div>
            <div class="flex flex-wrap items-center gap-2 mt-1.5">
              <span class="text-xs text-gray-500">${dateStr}</span>
              <span class="format-badge">${e.format.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</span>
              ${e.buyIn ? `<span class="text-xs text-gray-600">$${e.buyIn} buy-in</span>` : ''}
            </div>
          </div>
          <div class="flex items-center text-xs font-heading tracking-wider text-gray-500 shrink-0">
            ${dot}${isCompleted ? 'Done' : 'Open'}
          </div>
          ${isCompleted ? '<span class="text-flame text-sm shrink-0">→</span>' : ''}
        </div>`;

      return isCompleted
        ? `<a href="event.html?id=${e.tournamentId != null ? e.tournamentId : e.id}" class="block">${inner}</a>`
        : `<div>${inner}</div>`;
    }

    // Season money standings. Handles two event shapes:
    //  • Legacy (Season 9): payouts carry resolved player names + per-player amounts.
    //  • Admin events (Season 8+): positional payouts ({place, amount}) — winners are
    //    resolved live via the scoring engine and team prizes split per member.
    // CTP winnings (both eras) come from e.ctp = [{ hole, player, distance, amount }].
    // Note: side-pot money for admin events is not yet aggregated (no recorded winners).
    async function buildStandings(completedEvents, formats) {
      const players = {};
      const ensure = name => {
        const key = name.toLowerCase();
        if (!players[key]) players[key] = { name, earnings: 0, ctpEarnings: 0, wins: 0, events: new Set() };
        return players[key];
      };

      for (const e of completedEvents) {
        const hasNames = (e.payouts || []).some(p => p.player);

        if (hasNames) {
          for (const p of e.payouts) {
            if (!p.player) continue;
            const rec = ensure(p.player);
            rec.earnings += p.amount || 0;
            rec.events.add(e.id);
            if (p.place === 1) rec.wins++;
          }
        } else {
          // Resolve finishers + prize money from cached scorecards
          const fmt = formats[e.format];
          if (fmt && e.tournamentId != null) {
            try {
              const scorecards = await fetchScorecards(e.tournamentId);
              const results = applyFormat(scorecards, fmt, e);
              applyPayouts(results, e.payouts);   // no-op when payouts empty (e.g. Nassau prizes set in-engine)
              const teamSize = parseInt(fmt.teamSize) || 1;
              for (const r of results) {
                if (r.prize == null) continue;
                const members = r.isTeam ? r.displayMembers : [r.player_name];
                const share   = r.isTeam ? r.prize / teamSize : r.prize;
                for (const m of members) {
                  const rec = ensure(m.replace(/\s*\(sub\)$/, ''));
                  rec.earnings += share;
                  rec.events.add(e.id);
                  if (r.position === 1) rec.wins++;
                }
              }
              // Side-pot money (best individual net not on a winning team, etc.)
              for (const sp of resolveSidePots(results, e, fmt)) {
                if (!sp.player) continue;
                const rec = ensure(sp.player.replace(/\s*\(sub\)$/, ''));
                rec.earnings += sp.amount || 0;
                rec.events.add(e.id);
              }
            } catch { /* skip event if scoring fails */ }
          }
        }

        // CTP winnings (resolved winners stored on the event)
        for (const c of (e.ctp || [])) {
          if (!c.player) continue;
          const rec = ensure(c.player);
          rec.ctpEarnings += c.amount || 0;
          rec.events.add(e.id);
        }
      }

      return Object.values(players)
        .map(p => ({ ...p, total: p.earnings + p.ctpEarnings, events: p.events.size }))
        .sort((a, b) => b.total - a.total);
    }

    const money = n => n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

    function standingsTable(standings) {
      return `
        <div class="card-shadow rounded-xl overflow-auto border border-border" style="max-height: calc(100vh - 12rem)">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-surface">
                <th class="px-3 py-3 text-center font-heading font-600 tracking-widest text-gray-500 text-xs uppercase w-10">Pos</th>
                <th class="px-4 py-3 text-left font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Player</th>
                <th class="px-4 py-3 text-center font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Wins</th>
                <th class="px-4 py-3 text-right font-heading font-600 tracking-widest text-gray-500 text-xs uppercase hidden sm:table-cell">Earnings</th>
                <th class="px-4 py-3 text-right font-heading font-600 tracking-widest text-gray-500 text-xs uppercase hidden sm:table-cell">CTP</th>
                <th class="px-4 py-3 text-right font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Total</th>
              </tr>
            </thead>
            <tbody>
              ${standings.map((p, i) => `
                <tr class="standings-row border-t border-border">
                  <td class="px-3 py-3 text-center font-heading font-700 text-sm ${i === 0 ? 'text-flame' : 'text-gray-500'}">${i + 1}</td>
                  <td class="px-4 py-3 font-medium text-white">${p.name}</td>
                  <td class="px-4 py-3 text-center text-gray-400">${p.wins > 0 ? p.wins : '—'}</td>
                  <td class="px-4 py-3 text-right text-gray-300 font-mono text-sm hidden sm:table-cell">$${money(p.earnings)}</td>
                  <td class="px-4 py-3 text-right text-gray-400 font-mono text-sm hidden sm:table-cell">${p.ctpEarnings > 0 ? '$' + money(p.ctpEarnings) : '—'}</td>
                  <td class="px-4 py-3 text-right font-semibold text-flame font-mono">$${money(p.total)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function showError(msg) {
      document.getElementById('loading').innerHTML =
        `<div class="bg-red-900/20 border border-red-800 rounded-lg p-6 text-center max-w-md mx-auto">
          <p class="text-red-400 font-medium">Error</p>
          <p class="text-gray-400 text-sm mt-1">${msg}</p>
        </div>`;
    }

    init().catch(err => showError(err.message));
  </script>
  <script>
    (function() {
      const btn  = document.getElementById('menu-btn');
      const menu = document.getElementById('nav-menu');
      const bars = btn.querySelectorAll('.menu-bar');
      let open = false;
      function setOpen(val) {
        open = val;
        menu.classList.toggle('hidden', !open);
        bars[0].style.transform = open ? 'translateY(8px) rotate(45deg)' : '';
        bars[1].style.opacity   = open ? '0' : '1';
        bars[2].style.transform = open ? 'translateY(-8px) rotate(-45deg)' : '';
      }
      btn.addEventListener('click', e => { e.stopPropagation(); setOpen(!open); });
      document.addEventListener('click', e => { if (open && !menu.contains(e.target)) setOpen(false); });
    })();
  </script>
