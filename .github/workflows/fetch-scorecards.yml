name: Fetch Live Scorecards

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:        # also allows manual run from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Fetch scorecards for active season events
        env:
          SGT_API_KEY: ${{ secrets.SGT_API_KEY }}
        run: |
          # Find the active season ID
          ACTIVE_SEASON=$(jq -r '.[] | select(.status == "active") | .id' data/seasons.json | head -1)

          if [ -z "$ACTIVE_SEASON" ]; then
            echo "No active season found — nothing to fetch."
            exit 0
          fi

          echo "Active season: $ACTIVE_SEASON"

          # Load static events from repo
          STATIC_EVENTS=$(cat data/events.json)

          # Load admin-created events from Cloudflare KV via deployed API
          KV_EVENTS=$(curl -sf "https://mashup-golf-tour.pages.dev/api/events-admin?type=events" || echo "[]")
          echo "KV events fetched: $(echo "$KV_EVENTS" | jq 'length') events"

          # Merge both arrays, deduplicate by id (KV takes precedence over static)
          ALL_EVENTS=$(jq -n \
            --argjson static "$STATIC_EVENTS" \
            --argjson kv "$KV_EVENTS" \
            '($static + $kv) | reduce .[] as $e ({}; .[$e.id] = $e) | to_entries | map(.value)')

          # Get tournament IDs for non-completed events in the active season
          TOURNAMENT_IDS=$(echo "$ALL_EVENTS" | jq -r \
            --arg season "$ACTIVE_SEASON" \
            '.[] | select(.season == $season and .status != "completed") | .tournamentId')

          if [ -z "$TOURNAMENT_IDS" ]; then
            echo "No active events to fetch for $ACTIVE_SEASON."
            exit 0
          fi

          echo "Tournaments to fetch: $(echo "$TOURNAMENT_IDS" | tr '\n' ' ')"

          echo "$TOURNAMENT_IDS" | while read tid; do
            echo "Fetching tournament $tid..."
            curl -sf \
              "https://simulatorgolftour.com/sgt-api/mashup/tournaments/${tid}/scorecards?key=${SGT_API_KEY}&noTruncate" \
              -o "data/scorecards/${tid}.json"
            echo "  → saved data/scorecards/${tid}.json"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scorecards/
          if git diff --staged --quiet; then
            echo "No scorecard changes — skipping commit."
          else
            git commit -m "chore: refresh live scorecards $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
