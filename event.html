        </div>`;
    }

    // ── Devil's Draw reveal mode (?reveal=true) ─────────────────────────────
    function renderDevilsDrawReveal(scorecards, event, format) {
      const lsKey = `devils_draw_${event.tournamentId}`;
      const MAX = { '3bb': 5, '2bb': 6, '1bb': 5, 'zero': 2 };

      const catInfo = {
        '3bb':  { label: '3BB',  textCls: 'text-flame',     catCls: 'dd-cat-3bb'  },
        '2bb':  { label: '2BB',  textCls: 'text-amber-400', catCls: 'dd-cat-2bb'  },
        '1bb':  { label: '1BB',  textCls: 'text-blue-400',  catCls: 'dd-cat-1bb'  },
        'zero': { label: 'ZERO', textCls: 'text-gray-500',  catCls: 'dd-cat-zero' },
      };

      function loadState() {
        try {
          const s = localStorage.getItem(lsKey);
          if (s) return JSON.parse(s);
        } catch(e) {}
        // Pre-load from event.devilsDraw if already saved in events.json
        if (event.devilsDraw) {
          return { draw: event.devilsDraw, revealOrder: event.revealOrder || Object.values(event.devilsDraw).flat() };
        }
        return { draw: { '3bb': [], '2bb': [], '1bb': [], 'zero': [] }, revealOrder: [] };
      }

      let state = loadState();
      let selectedHole = null;

      function saveState() { localStorage.setItem(lsKey, JSON.stringify(state)); }

      function getHoleCat(hole) {
        for (const [cat, holes] of Object.entries(state.draw)) {
          if (holes.includes(hole)) return cat;
        }
        return null;
      }

      function remaining(cat) { return MAX[cat] - state.draw[cat].length; }
      function totalAssigned() { return Object.values(state.draw).flat().length; }

      function assignHole(hole, cat) {
        for (const c of Object.keys(state.draw)) state.draw[c] = state.draw[c].filter(h => h !== hole);
        state.revealOrder = state.revealOrder.filter(h => h !== hole);
        state.draw[cat].push(hole);
        state.revealOrder.push(hole);
        saveState();
      }

      function unassignHole(hole) {
        for (const c of Object.keys(state.draw)) state.draw[c] = state.draw[c].filter(h => h !== hole);
        state.revealOrder = state.revealOrder.filter(h => h !== hole);
        saveState();
      }

      // Unassigned holes score as zero during live entry
      function buildScoringDraw() {
        const partial = {
          '3bb': [...state.draw['3bb']], '2bb': [...state.draw['2bb']],
          '1bb': [...state.draw['1bb']], 'zero': [...state.draw['zero']],
        };
        for (let h = 1; h <= 18; h++) {
          if (!getHoleCat(h)) partial['zero'].push(h);
        }
        return partial;
      }

      function renderLeaderboard(done) {
        const lbEl = document.getElementById('reveal-leaderboard');
        if (!lbEl) return;
        const n = totalAssigned();
        if (n === 0) {
          lbEl.innerHTML = `<div class="text-center text-gray-600 text-sm py-8">Assign a hole to see the Devil Score leaderboard.</div>`;
          return;
        }

        const results = applyFormat(scorecards, format, { ...event, devilsDraw: buildScoringDraw() });
        if (done) applyPayouts(results, event.payouts);

        const rows = results.map((team, ri) => {
          const posStr   = team.tied ? `T${team.position}` : team.position;
          const toParStr = formatToPar(team.toPar);
          const toParCls = team.toPar < 0 ? 'under' : team.toPar > 0 ? 'over' : 'even';
          const isLeader = team.position === 1;
          const memberHtml = team.displayMembers.map(m => `<div class="text-xs text-gray-300">${m}</div>`).join('');

          if (done) {
            const scHtml = buildTeamScorecardHTML(team, format);
            const prizeStr = team.prize != null ? `$${team.prize}` : '—';
            return `
              <tr class="lb-row border-t border-border cursor-pointer select-none" data-lb-row="${ri}">
                <td class="px-3 py-2.5 text-center font-heading font-700 text-sm ${isLeader ? 'text-flame' : 'text-gray-500'}">${posStr}</td>
                <td class="px-4 py-2.5 leading-snug">${memberHtml}</td>
                <td class="px-3 py-2.5 text-center font-semibold font-mono ${toParCls}">${toParStr}</td>
                <td class="px-3 py-2.5 text-center text-gray-400 font-mono text-xs hidden sm:table-cell">${team.aggregate}</td>
                <td class="px-4 py-2.5 text-center font-semibold ${team.prize != null ? 'text-flame' : 'text-gray-700'}">${prizeStr}</td>
              </tr>
              <tr id="lb-sc-${ri}" class="hidden">
                <td colspan="99" class="p-0 border-b border-border">
                  <div class="bg-[#111] px-4 py-4 border-t border-[rgba(249,115,22,0.15)]">
                    <div class="text-xs font-heading tracking-wider text-gray-500 uppercase mb-3">Team Scorecard — ${team.displayMembers.join(' / ')}</div>
                    ${scHtml}
                  </div>
                </td>
              </tr>`;
          }

          return `
            <tr class="border-t border-border hover:bg-[rgba(255,255,255,0.02)] transition-colors">
              <td class="px-3 py-2.5 text-center font-heading font-700 text-sm ${isLeader ? 'text-flame' : 'text-gray-500'}">${posStr}</td>
              <td class="px-4 py-2.5 leading-snug">${memberHtml}</td>
              <td class="px-3 py-2.5 text-center font-semibold font-mono ${toParCls}">${toParStr}</td>
              <td class="px-3 py-2.5 text-center text-gray-400 font-mono text-xs hidden sm:table-cell">${team.aggregate}</td>
            </tr>`;
        }).join('');

        lbEl.innerHTML = `
          <h2 class="font-heading font-700 text-sm tracking-widest text-gray-400 uppercase mb-3">
            ${done ? 'Final Standings' : 'Devil Score — Live'}
            <span class="text-gray-600 font-400 normal-case tracking-normal text-xs ml-2">${n}/18 holes</span>
          </h2>
          <div class="card-shadow rounded-xl overflow-hidden border border-border">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-surface">
                    <th class="px-3 py-3 text-center font-heading font-600 tracking-widest text-gray-500 text-xs uppercase w-10">Pos</th>
                    <th class="px-4 py-3 text-left font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Team</th>
                    <th class="px-3 py-3 text-center font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">+/−</th>
                    <th class="px-3 py-3 text-center font-heading font-600 tracking-widest text-gray-500 text-xs uppercase hidden sm:table-cell">Agg</th>
                    ${done ? '<th class="px-4 py-3 text-center font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Prize</th>' : ''}
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>`;

        if (done) {
          if (event.ctp?.length) lbEl.insertAdjacentHTML('beforeend', buildCtpHtml(event.ctp));
          lbEl.querySelectorAll('[data-lb-row]').forEach(row => {
            row.addEventListener('click', () => {
              const ri = row.dataset.lbRow;
              const sc = document.getElementById(`lb-sc-${ri}`);
              if (sc) { sc.classList.toggle('hidden'); row.classList.toggle('expanded', !sc.classList.contains('hidden')); }
            });
          });
        }
      }

      function render() {
        const app = document.getElementById('app');
        const n    = totalAssigned();
        const done = n === 18;

        // Count tracker
        const countsHtml = Object.entries(MAX).map(([cat, max]) => {
          const used = state.draw[cat].length;
          const left = max - used;
          const info = catInfo[cat];
          return `
            <div class="flex items-center gap-2">
              <span class="${info.textCls} font-heading font-700 text-sm tracking-wider">${info.label}</span>
              <span class="text-xs font-mono ${left === 0 ? 'text-gray-600' : 'text-gray-300'}">${used}/${max}</span>
              <span class="text-[10px] text-gray-600">${left === 0 ? '✓ full' : left + ' left'}</span>
            </div>`;
        }).join('');

        // Tile grid
        const tilesHtml = Array.from({ length: 18 }, (_, i) => {
          const hole = i + 1;
          const cat  = getHoleCat(hole);
          const isSel = selectedHole === hole;
          const info  = cat ? catInfo[cat] : null;

          let cls = 'dd-tile';
          if (cat) cls += ` flipped no-transition ${info.catCls}`;
          if (isSel && !cat) cls += ' next-up';

          return `
            <div class="${cls}" data-hole="${hole}" id="tile-${hole}" style="cursor:pointer">
              <div class="dd-tile-inner">
                <div class="dd-tile-front"
                     style="${isSel && cat ? 'border-color:rgba(249,115,22,0.5);box-shadow:0 0 14px rgba(249,115,22,0.2)' : ''}">
                  <div class="dd-q">${hole}</div>
                  <div class="dd-hnum">${isSel ? '↓' : ''}</div>
                </div>
                <div class="dd-tile-back ${isSel ? 'ring-1 ring-white/20' : ''}">
                  <div class="dd-cat-lbl ${info?.textCls || 'text-gray-500'}">${info?.label || '?'}</div>
                  <div class="dd-hnum-back">H${hole}</div>
                </div>
              </div>
            </div>`;
        }).join('');

        // Assignment panel
        let assignHtml = '';
        if (!done) {
          if (selectedHole !== null) {
            const curCat = getHoleCat(selectedHole);
            const catBtns = Object.entries(catInfo).map(([cat, info]) => {
              const rem       = remaining(cat);
              const isCurrent = curCat === cat;
              const disabled  = rem <= 0 && !isCurrent;
              return `
                <button data-assign-cat="${cat}" ${disabled ? 'disabled' : ''}
                  class="flex-1 min-w-[72px] px-3 py-3 rounded-lg font-heading font-700 text-sm tracking-widest
                    ${isCurrent ? 'ring-2 ring-white/25 ' : ''}
                    ${disabled  ? 'opacity-25 cursor-not-allowed ' : ''}
                    ${cat === '3bb'  ? 'bg-[rgba(249,115,22,0.2)] border border-[rgba(249,115,22,0.45)] text-flame' : ''}
                    ${cat === '2bb'  ? 'bg-[rgba(251,191,36,0.17)] border border-[rgba(251,191,36,0.4)] text-amber-400' : ''}
                    ${cat === '1bb'  ? 'bg-[rgba(59,130,246,0.17)] border border-[rgba(59,130,246,0.4)] text-blue-400' : ''}
                    ${cat === 'zero' ? 'bg-[rgba(80,80,80,0.12)] border border-[rgba(80,80,80,0.35)] text-gray-400' : ''}
                  " style="transition:background 0.12s">
                  <div>${info.label}</div>
                  <div class="text-[10px] font-400 opacity-60 mt-0.5 normal-case tracking-normal">
                    ${isCurrent ? 'current' : disabled ? 'full' : rem + ' remaining'}
                  </div>
                </button>`;
            }).join('');

            assignHtml = `
              <div class="bg-[#1a1a1a] border border-border rounded-xl px-4 py-3 mb-5">
                <div class="flex items-center justify-between mb-3">
                  <div class="text-xs font-heading tracking-widest text-gray-400 uppercase">
                    Assign Hole <span class="text-white font-700">${selectedHole}</span>
                    ${curCat ? `<span class="ml-2 text-gray-600 normal-case tracking-normal font-400">currently ${catInfo[curCat].label}</span>` : ''}
                  </div>
                  <div class="flex gap-3">
                    ${curCat ? `<button data-unassign class="text-xs text-red-500/70 hover:text-red-400 font-heading tracking-wider uppercase" style="transition:color 0.12s">Remove</button>` : ''}
                    <button data-deselect class="text-xs text-gray-600 hover:text-gray-400 font-heading tracking-wider uppercase" style="transition:color 0.12s">Cancel</button>
                  </div>
                </div>
                <div class="flex flex-wrap gap-2">${catBtns}</div>
              </div>`;
          } else {
            assignHtml = `
              <div class="border border-border border-dashed rounded-xl px-5 py-4 mb-5 text-center text-xs text-gray-600">
                Click any hole tile above, then assign its category
              </div>`;
          }
        }

        // JSON output when all 18 are done
        let jsonHtml = '';
        if (done) {
          const revStr = JSON.stringify(state.revealOrder);
          const drawStr = JSON.stringify(state.draw, null, 2).replace(/^/gm, '        ').trimStart();
          jsonHtml = `
            <div class="mt-6 bg-emerald-900/10 border border-emerald-800/30 rounded-xl px-5 py-4">
              <div class="flex items-center justify-between mb-2">
                <div class="text-xs font-heading font-600 tracking-widest text-emerald-400 uppercase">Draw Complete — Save to events.json</div>
                <button id="btn-copy" class="text-xs bg-emerald-900/30 hover:bg-emerald-900/50 border border-emerald-700/40 text-emerald-400 rounded px-3 py-1.5 font-heading tracking-wider" style="transition:background 0.12s">Copy</button>
              </div>
              <p class="text-xs text-gray-600 mb-3">Paste these two fields into the Week 6 event in data/events.json, then reload the regular event page to see final results.</p>
              <pre id="json-out" class="text-xs text-gray-300 bg-[#0c0c0c] rounded-lg p-4 overflow-x-auto leading-relaxed font-mono">"devilsDraw": ${drawStr},
"revealOrder": ${revStr}</pre>
            </div>`;
        }

        app.innerHTML = `
          <div class="flex items-center justify-between mb-4">
            <div>
              <div class="text-xs font-heading font-600 tracking-widest text-gray-500 uppercase mb-1">Devil's Draw — Live Entry</div>
              <div class="text-sm text-gray-400">
                <span class="text-white font-semibold">${n}</span>/18 holes assigned
                ${done ? ' <span class="text-emerald-400 ml-1">● Complete</span>' : ''}
              </div>
            </div>
            <button id="btn-reset" class="text-xs text-gray-600 hover:text-gray-400 border border-border rounded px-3 py-1.5 font-heading tracking-wider uppercase" style="transition:color 0.12s">Reset</button>
          </div>

          <div class="flex flex-wrap gap-4 mb-5 px-1">${countsHtml}</div>

          <div class="flex flex-wrap gap-2 justify-center mb-4">${tilesHtml}</div>

          <div class="flex flex-wrap gap-x-5 gap-y-1 justify-center mb-5 text-xs text-gray-600">
            <span class="text-flame font-heading font-600 text-[10px] tracking-widest">3BB</span><span>All 3 scores (5 holes)</span>
            <span class="text-amber-400 font-heading font-600 text-[10px] tracking-widest">2BB</span><span>Best 2 (6 holes)</span>
            <span class="text-blue-400 font-heading font-600 text-[10px] tracking-widest">1BB</span><span>Best 1 (5 holes)</span>
            <span class="text-gray-500 font-heading font-600 text-[10px] tracking-widest">ZERO</span><span>Doesn't count (2 holes)</span>
          </div>

          ${assignHtml}

          <div id="reveal-leaderboard"></div>
          ${jsonHtml}
        `;

        // Reset
        document.getElementById('btn-reset').addEventListener('click', () => {
          if (!confirm('Reset the entire draw? This cannot be undone.')) return;
          localStorage.removeItem(lsKey);
          state = { draw: { '3bb': [], '2bb': [], '1bb': [], 'zero': [] }, revealOrder: [] };
          selectedHole = null;
          render();
        });

        // Tile click → select / deselect
        document.querySelectorAll('[data-hole]').forEach(tile => {
          tile.addEventListener('click', () => {
            const hole = parseInt(tile.dataset.hole);
            selectedHole = (selectedHole === hole) ? null : hole;
            render();
          });
        });

        // Cancel selection
        document.querySelector('[data-deselect]')?.addEventListener('click', e => {
          e.stopPropagation();
          selectedHole = null;
          render();
        });

        // Remove assignment
        document.querySelector('[data-unassign]')?.addEventListener('click', e => {
          e.stopPropagation();
          if (selectedHole !== null) { unassignHole(selectedHole); selectedHole = null; render(); }
        });

        // Assign category — flip animation on the newly assigned tile
        document.querySelectorAll('[data-assign-cat]').forEach(btn => {
          if (btn.disabled) return;
          btn.addEventListener('click', () => {
            if (selectedHole === null) return;
            const hole = selectedHole;
            const cat  = btn.dataset.assignCat;
            assignHole(hole, cat);
            selectedHole = null;
            render(); // tile now has flipped+no-transition; we undo that for animation
            const tile = document.getElementById(`tile-${hole}`);
            if (tile) {
              tile.classList.remove('flipped', 'no-transition');
              void tile.offsetWidth; // force reflow so transition fires
              tile.classList.add('flipped');
            }
          });
        });

        // Copy JSON
        document.getElementById('btn-copy')?.addEventListener('click', () => {
          const el = document.getElementById('json-out');
          if (!el) return;
          navigator.clipboard.writeText(el.textContent).then(() => {
            const btn = document.getElementById('btn-copy');
            if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000); }
          });
        });

        renderLeaderboard(done);
      }

      render();
    }

    function renderInvitationalResults(event) {
      const placeLabel = { 1: '1st', 2: '2nd', 3: '3rd', 4: '4th' };

      const byPlace = {};

        if (!byPlace[p.place]) byPlace[p.place] = [];
        byPlace[p.place].push(p);

      const placesHtml = Object.entries(byPlace)
        .sort((a, b) => a[0] - b[0])
        .map(([place, players]) => {
          const amount = players[0].amount;
          const col = placeColor[place] || 'text-gray-500';
          const label = placeLabel[place] || `${place}th`;
          const names = players.map(p =>
            `<span class="text-white font-medium">${p.player}</span>`
          ).join('<span class="text-gray-600 mx-1">·</span>');
          return `
            <tr class="standings-row border-t border-border">
              <td class="px-3 py-4 text-center font-heading font-700 text-base ${col}">${label}</td>
              <td class="px-4 py-4 leading-relaxed">${names}</td>
              <td class="px-4 py-4 text-right font-mono font-semibold text-flame">$${(amount * players.length).toLocaleString()}</td>
              <td class="px-4 py-4 text-right font-mono text-gray-400 hidden sm:table-cell">$${amount.toLocaleString()} each</td>
            </tr>`;
        }).join('');

      const ctpRows = (event.ctp || []).map(c => `
        <tr class="standings-row border-t border-border">
          <td class="px-4 py-3 font-medium text-white">${c.player}</td>
          <td class="px-4 py-3 text-right font-mono font-semibold text-flame">$${c.amount}</td>
        </tr>`).join('');

      const ctpSection = ctpRows ? `
        <section class="mt-8">
          <h2 class="font-heading font-700 text-sm tracking-widest text-gray-400 uppercase mb-3">CTP Winnings</h2>
          <div class="card-shadow rounded-xl overflow-hidden border border-border">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-surface">
                  <th class="px-4 py-3 text-left font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Player</th>
                  <th class="px-4 py-3 text-right font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Winnings</th>
                </tr>
              </thead>
              <tbody>${ctpRows}</tbody>
            </table>
          </div>
        </section>` : '';

      document.getElementById('app').innerHTML = `
        ${event.notes ? `<div class="flex items-start gap-2 bg-surface border border-border rounded-lg px-4 py-3 mb-5 text-xs text-gray-400"><span class="mt-0.5 shrink-0">ℹ</span><span>${event.notes}</span></div>` : ''}
        <section>
          <h2 class="font-heading font-700 text-sm tracking-widest text-gray-400 uppercase mb-3">Final Standings</h2>
          <div class="card-shadow rounded-xl overflow-hidden border border-border">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-surface">
                  <th class="px-3 py-3 text-center font-heading font-600 tracking-widest text-gray-500 text-xs uppercase w-16">Place</th>
                  <th class="px-4 py-3 text-left font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Team</th>
                  <th class="px-4 py-3 text-right font-heading font-600 tracking-widest text-gray-500 text-xs uppercase">Team Total</th>
                  <th class="px-4 py-3 text-right font-heading font-600 tracking-widest text-gray-500 text-xs uppercase hidden sm:table-cell">Per Player</th>
                </tr>
              </thead>
              <tbody>${placesHtml}</tbody>
            </table>
          </div>
        </section>
        ${ctpSection}`;
    }

    function showError(msg) {
      document.getElementById('loading').innerHTML =
        `<div class="bg-red-900/20 border border-red-800 rounded-lg p-6 text-center max-w-md mx-auto">
          <p class="text-red-400 font-medium">Error</p>
          <p class="text-gray-400 text-sm mt-1">${msg}</p>
        </div>`;
    }

    init().catch(err => showError(err.message));
  </script>
  <script>
    (function() {
      const btn  = document.getElementById('menu-btn');
      const menu = document.getElementById('nav-menu');
      const bars = btn.querySelectorAll('.menu-bar');
      let open = false;
      function setOpen(val) {
        open = val;
        menu.classList.toggle('hidden', !open);
        bars[0].style.transform = open ? 'translateY(8px) rotate(45deg)' : '';
        bars[1].style.opacity   = open ? '0' : '1';
        bars[2].style.transform = open ? 'translateY(-8px) rotate(-45deg)' : '';
      }
      btn.addEventListener('click', e => { e.stopPropagation(); setOpen(!open); });
      document.addEventListener('click', e => { if (open && !menu.contains(e.target)) setOpen(false); });
    })();
  </script>
</body>
</html>
